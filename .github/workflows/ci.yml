name: CI - Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vehicle_resale_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Build com Maven
      run: ./mvnw -B package -DskipTests

    - name: Executar testes
      env:
        DB_URL: jdbc:postgresql://localhost:5432/vehicle_resale_test
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
        QUARKUS_OIDC_AUTH_SERVER_URL: http://localhost:8180/realms/vehicle-resale
        QUARKUS_OIDC_CLIENT_ID: vehicle-resale-api
        QUARKUS_OIDC_CREDENTIALS_SECRET: vehicle-resale-secret
      run: ./mvnw -B verify

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: target/surefire-reports/

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Verificar formatacao do codigo
      run: ./mvnw -B spotless:check || true

    - name: Verificar vulnerabilidades
      run: ./mvnw -B dependency-check:check || true

