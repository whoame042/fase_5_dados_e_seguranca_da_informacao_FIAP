name: Pull Request Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-and-validate:
    name: Lint and Validate
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Validar POM
      run: ./mvnw -B validate

    - name: Compilar projeto
      run: ./mvnw -B compile

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint-and-validate
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vehicle_resale_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Executar testes unitarios
      env:
        DB_URL: jdbc:postgresql://localhost:5432/vehicle_resale_test
        DB_USERNAME: postgres
        DB_PASSWORD: postgres
      run: ./mvnw -B test

    - name: Gerar relatorio de cobertura
      run: ./mvnw -B jacoco:report || true

    - name: Upload relatorio de cobertura
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: target/site/jacoco/

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build com Maven
      run: ./mvnw -B package -DskipTests

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build da imagem Docker (sem push)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: vehicle-resale-api:pr-${{ github.event.number }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-validate
    
    steps:
    - name: Checkout do codigo
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: OWASP Dependency Check
      run: ./mvnw -B org.owasp:dependency-check-maven:check || true

    - name: Upload OWASP report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: owasp-report
        path: target/dependency-check-report.html
        if-no-files-found: ignore

