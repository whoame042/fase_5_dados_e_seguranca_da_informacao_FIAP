  #     timeout: 3s
  #     retries: 5
  #   restart: unless-stopped

  # Mailhog - Servidor SMTP para testes de email (opcional)
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   container_name: vehicle-resale-mailhog-dev
  #   ports:
  #     - "1025:1025"  # SMTP
  #     - "8025:8025"  # Interface Web
  #   networks:
  #     - dev-network
  #   restart: unless-stopped

  # pgAdmin - Interface web para PostgreSQL (opcional)
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: vehicle-resale-pgadmin-dev
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "5050:80"
  #   networks:
  #     - dev-network
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped

volumes:
  postgres-dev-data:
    driver: local

networks:
  dev-network:
    driver: bridge
    name: vehicle-resale-dev-network

