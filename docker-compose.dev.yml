version: '3.8'

# Arquivo docker-compose para ambiente de desenvolvimento
# Use: docker-compose -f docker-compose.dev.yml up -d

services:
  # PostgreSQL - Banco de dados principal
  postgres:
    image: postgres:15-alpine
    container_name: vehicle-resale-postgres-dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vehicle_resale}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./init-data.sql:/docker-entrypoint-initdb.d/init-data.sql
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - Cache (opcional, descomente se necessário)
