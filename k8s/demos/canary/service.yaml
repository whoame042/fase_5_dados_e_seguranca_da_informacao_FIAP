apiVersion: v1
kind: Service
metadata:
  name: vehicle-resale-api-canary-service
  namespace: vehicle-resale
  labels:
    app: vehicle-resale-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8082
    protocol: TCP
    name: http
  selector:
    app: vehicle-resale-api  # Seleciona TODAS as versões (v1 e v2)
    # Kubernetes faz load balancing baseado no número de pods
    # Se v1 tem 9 pods e v2 tem 1 pod, ~90% vai para v1 e ~10% para v2

