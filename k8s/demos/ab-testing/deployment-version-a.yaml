apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-resale-api-version-a
  namespace: vehicle-resale
  labels:
    app: vehicle-resale-api
    version: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vehicle-resale-api
      version: a
  template:
    metadata:
      labels:
        app: vehicle-resale-api
        version: a
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8082"
    spec:
      containers:
      - name: vehicle-resale-api
        image: vehicle-resale-api:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
          name: http
          protocol: TCP
        env:
        - name: APP_VERSION
          value: "A"
        - name: FEATURE_NEW_UI
          value: "false"  # Versão antiga
        - name: QUARKUS_HTTP_PORT
          value: "8082"
        - name: DB_URL
          value: "jdbc:postgresql://local-postgres-service:5432/vehicle_resale"
        - name: DB_USERNAME
          value: "postgres"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: local-postgres-secret
              key: POSTGRES_PASSWORD
        - name: QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION
          value: "update"
        - name: QUARKUS_LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 5

