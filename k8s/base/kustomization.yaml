apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vehicle-resale

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - postgres-configmap.yaml
  - postgres-secret.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  - init-data-configmap.yaml
  - init-data-job.yaml

commonLabels:
  app.kubernetes.io/name: vehicle-resale-api
  app.kubernetes.io/part-of: vehicle-resale-system

