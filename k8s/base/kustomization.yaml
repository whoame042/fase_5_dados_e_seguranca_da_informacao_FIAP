apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vehicle-resale

resources:
  # Namespace
  - namespace.yaml
  
  # API Application
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  
  # PostgreSQL (API Database)
  - postgres-configmap.yaml
  - postgres-secret.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
  
  # Keycloak (Authentication Service - Separated)
  - keycloak-configmap.yaml
  - keycloak-secret.yaml
  - keycloak-postgres-pvc.yaml
  - keycloak-postgres-deployment.yaml
  - keycloak-postgres-service.yaml
  - keycloak-deployment.yaml
  - keycloak-service.yaml

configMapGenerator:
  - name: keycloak-realm-config
    files:
      - realm-export.json=../../keycloak/realm-export.json

commonLabels:
  app.kubernetes.io/name: vehicle-resale-api
  app.kubernetes.io/part-of: vehicle-resale-system
