apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: vehicle-resale
  labels:
    app: keycloak
data:
  KC_DB: postgres
  KC_DB_URL: jdbc:postgresql://keycloak-postgres-service:5432/keycloak
  KC_DB_USERNAME: keycloak
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"
  KC_HTTP_PORT: "8180"

