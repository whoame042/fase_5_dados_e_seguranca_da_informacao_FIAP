apiVersion: v1
kind: ConfigMap
metadata:
  name: vehicle-resale-config
  namespace: vehicle-resale
data:
  # Corrige o nome do servico PostgreSQL para o ambiente local (com prefixo)
  DB_URL: "jdbc:postgresql://local-postgres-service:5432/vehicle_resale"
  # Porta correta da aplicação Quarkus
  QUARKUS_HTTP_PORT: "8082"

