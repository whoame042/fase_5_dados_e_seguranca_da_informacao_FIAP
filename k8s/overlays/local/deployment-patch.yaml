apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-resale-api
  namespace: vehicle-resale
spec:
  template:
    spec:
      containers:
      - name: vehicle-resale-api
        # Para Minikube, a imagem deve ser construída localmente
        # O imagePullPolicy Never garante que use a imagem local
        imagePullPolicy: Never
        # A imagem será construída pelo script deploy-minikube.sh
        # e estará disponível no ambiente Docker do Minikube

