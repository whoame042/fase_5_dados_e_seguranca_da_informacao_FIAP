apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: local-vehicle-resale-api-hpa
  namespace: vehicle-resale
  labels:
    app: vehicle-resale-api
    environment: local
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: local-vehicle-resale-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50  # Baixo para demonstração rápida
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60  # Reduzido para demonstração
      policies:
      - type: Percent
        value: 50
        periodSeconds: 30
      - type: Pods
        value: 1
        periodSeconds: 30
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0   # Escala imediatamente
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

