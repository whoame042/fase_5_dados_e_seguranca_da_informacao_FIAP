apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vehicle-resale-api-ingress
  namespace: vehicle-resale
  annotations:
    # Azure Application Gateway Ingress Controller annotations
    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
    appgw.ingress.kubernetes.io/health-probe-path: "/health/ready"
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200"
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
    # Optional: For HTTPS
    # appgw.ingress.kubernetes.io/appgw-ssl-certificate: "certificate-name"
spec:
  ingressClassName: azure-application-gateway
  rules:
  - host: vehicle-resale-api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vehicle-resale-api-service
            port:
              number: 80

