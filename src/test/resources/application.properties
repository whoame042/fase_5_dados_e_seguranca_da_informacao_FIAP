# Configuracoes para testes

# Porta HTTP para testes (0 = porta aleatoria)
quarkus.http.test-port=0
quarkus.http.test-ssl-port=0

# Banco de dados H2 em memoria para testes
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate para testes
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# Desabilitar CORS para testes
quarkus.http.cors=false

# Desabilitar OIDC para testes (usar SecurityIdentity mock)
quarkus.oidc.enabled=false
quarkus.security.auth.enabled-in-dev-mode=false

# Desabilitar autenticacao para testes
quarkus.http.auth.basic=false
quarkus.http.auth.proactive=false
