# Configuracao da aplicacao
quarkus.application.name=vehicle-resale-api

# Configuracao do servidor
quarkus.http.port=8082

# Configuracao do banco de dados
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5433/vehicle_resale}
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20

# Configuracao do Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=no-file

# ============================================
# CONFIGURACAO OIDC/KEYCLOAK
# Servico de autenticacao separado
# ============================================
quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/vehicle-resale}
quarkus.oidc.client-id=${QUARKUS_OIDC_CLIENT_ID:vehicle-resale-api}
quarkus.oidc.credentials.secret=${QUARKUS_OIDC_CREDENTIALS_SECRET:vehicle-resale-secret}
quarkus.oidc.tls.verification=none
quarkus.oidc.token.issuer=any
quarkus.oidc.roles.source=accesstoken
quarkus.oidc.roles.role-claim-path=realm_access/roles

# Politica de seguranca por path
# Endpoints publicos (sem autenticacao)
quarkus.http.auth.permission.public.paths=/health/*,/metrics,/openapi,/swagger-ui/*,/q/*
quarkus.http.auth.permission.public.policy=permit

# Listagem de veiculos disponiveis - publico (visitantes podem ver)
quarkus.http.auth.permission.vehicles-available.paths=/api/vehicles/available
quarkus.http.auth.permission.vehicles-available.methods=GET
quarkus.http.auth.permission.vehicles-available.policy=permit

# Buscar veiculo por ID - publico
quarkus.http.auth.permission.vehicle-get.paths=/api/vehicles/*
quarkus.http.auth.permission.vehicle-get.methods=GET
quarkus.http.auth.permission.vehicle-get.policy=permit

# Gestao de veiculos - apenas admin
quarkus.http.auth.permission.vehicles-admin.paths=/api/vehicles,/api/vehicles/*
quarkus.http.auth.permission.vehicles-admin.methods=POST,PUT,DELETE
quarkus.http.auth.permission.vehicles-admin.policy=authenticated
quarkus.http.auth.policy.vehicles-admin.roles-allowed=admin

# Vendas - apenas usuarios autenticados (buyer ou admin)
quarkus.http.auth.permission.sales.paths=/api/sales,/api/sales/*
quarkus.http.auth.permission.sales.policy=authenticated

# Webhook de pagamento - servico externo (autenticado por header especial)
quarkus.http.auth.permission.webhook.paths=/api/webhook/*
quarkus.http.auth.permission.webhook.policy=permit

# Endpoints de cliente - usuarios autenticados
quarkus.http.auth.permission.customers.paths=/api/customers,/api/customers/*
quarkus.http.auth.permission.customers.policy=authenticated

# ============================================
# CONFIGURACAO DO OPENAPI/SWAGGER
# ============================================
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=API de Revenda de Veiculos
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=API para gerenciamento de revenda de veiculos automotores. Autenticacao via Keycloak (OAuth2/OIDC).
mp.openapi.extensions.smallrye.info.contact.email=contato@vehicleresale.com
mp.openapi.extensions.smallrye.info.contact.name=Vehicle Resale Team

# Configuracao de seguranca OpenAPI
quarkus.smallrye-openapi.security-scheme=oidc
quarkus.smallrye-openapi.security-scheme-name=keycloak
quarkus.smallrye-openapi.oidc-open-id-connect-url=http://localhost:8180/realms/vehicle-resale/.well-known/openid-configuration

# Health Check
quarkus.smallrye-health.root-path=/health

# Metrics
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.vehicleresale".level=DEBUG
quarkus.log.category."io.quarkus.oidc".level=DEBUG
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{3.}] %s%e%n

# CORS (para desenvolvimento)
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.exposed-headers=Authorization
